<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌唱分配計時</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1b1d22; --panel:rgba(36,38,45,.88); --line:#34373f;
    --text:#e8e6e1; --muted:#8b8e97;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh; padding:18px 16px 60px;
    background-size:cover; background-position:center; background-attachment:fixed;
  }
  body.has-bgimg::before{
    content:''; position:fixed; inset:0; background:rgba(15,16,20,.45); z-index:-1;
  }
  .wrap{max-width:860px; margin:0 auto; display:flex; flex-direction:column; gap:22px;}
  .head{display:flex; justify-content:space-between; align-items:center;}
  h1{font-size:1.05rem; font-weight:700; letter-spacing:.12em;}
  h2{font-size:.78rem; font-weight:500; color:var(--muted); letter-spacing:.12em; margin-bottom:10px;}
  .mono{font-family:'Chivo Mono',monospace; font-variant-numeric:tabular-nums;}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);}

  .btn{
    padding:9px 16px; border-radius:9px; border:1px solid var(--line);
    background:rgba(127,127,127,.12); color:var(--text);
    font-family:inherit; font-size:.85rem; cursor:pointer;
  }
  .btn:hover{background:rgba(127,127,127,.25);}
  .btn.primary{background:var(--text); color:var(--bg); font-weight:700; border-color:transparent;}
  .btn:disabled{opacity:.35; cursor:default;}
  .btn.small{padding:5px 12px; font-size:.78rem;}

  /* ---- player ---- */
  .player{display:flex; flex-direction:column; gap:12px;}
  .player .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  video{width:100%; max-height:300px; border-radius:10px; background:#000; display:none;}
  video.show{display:block;}
  .timer{font-size:1.9rem; font-weight:300; margin-left:auto;}
  .timer small{color:var(--muted); font-size:.9rem;}
  .seek{width:100%;}
  .filehint{font-size:.72rem; color:var(--muted);}

  /* ---- members ---- */
  .members-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .members-head h2{margin:0;}
  .count{display:flex; gap:6px; align-items:center; font-size:.8rem; color:var(--muted);}
  .members{display:grid; gap:10px;}
  .member{display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;}
  .avatar{
    width:100%; aspect-ratio:3/4; border-radius:10px;
    background:rgba(127,127,127,.15); border:3px solid var(--line);
    filter:grayscale(60%) brightness(.55);
    transition:filter .18s, border-color .18s, box-shadow .18s;
    display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; color:var(--muted); overflow:hidden;
  }
  .avatar img{width:100%; height:100%; object-fit:cover;}
  .member.active .avatar{filter:none; border-color:var(--c); box-shadow:0 0 18px var(--c);}
  .member .mname{font-size:.7rem; color:var(--muted); max-width:100%;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .member.active .mname{color:var(--text);}

  /* ---- bars ---- */
  .bars{display:flex; flex-direction:column; gap:9px;}
  .barrow{display:grid; grid-template-columns:86px 1fr 66px; gap:10px; align-items:center;}
  .barrow .bname{font-size:.78rem; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .track{height:22px; background:rgba(127,127,127,.14); border:1px solid var(--line); border-radius:6px; overflow:hidden;}
  .fill{height:100%; width:0%; background:var(--c); border-radius:5px 0 0 5px; opacity:.92;}
  .barrow.active .fill{box-shadow:0 0 12px var(--c);}
  .bval{font-size:.78rem; color:var(--muted);}
  .barrow.active .bval{color:var(--text);}

  /* ---- segments ---- */
  .quick{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px;}
  select,input[type=text]{
    padding:8px 10px; border-radius:8px; border:1px solid var(--line);
    background:rgba(127,127,127,.1); color:var(--text); font-family:inherit; font-size:.85rem;
  }
  table{width:100%; border-collapse:collapse; font-size:.82rem;}
  th{color:var(--muted); font-weight:500; text-align:left; padding:6px 8px; font-size:.72rem;}
  td{padding:5px 8px; border-top:1px solid var(--line);}
  td input{width:84px;}
  .tbtn{padding:4px 9px; border-radius:6px; border:1px solid var(--line);
    background:none; color:var(--muted); cursor:pointer; font-size:.72rem; font-family:inherit;}
  .tbtn:hover{color:var(--text); background:rgba(127,127,127,.15);}
  .dot{display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; border:1px solid var(--line);}
  .hint{font-size:.72rem; color:var(--muted); margin-top:10px; line-height:1.7;}

  /* ---- modal ---- */
  .overlay{position:fixed; inset:0; background:rgba(10,11,14,.72); z-index:100;
    display:none; align-items:center; justify-content:center; padding:16px;}
  .overlay.open{display:flex;}
  .sheet{background:var(--bg); border:1px solid var(--line); border-radius:16px;
    width:min(380px,94vw); max-height:88vh; overflow-y:auto; padding:18px;
    display:flex; flex-direction:column; gap:14px; color:var(--text);}
  .sheet h3{font-size:.95rem; letter-spacing:.06em;}
  .sheet label{font-size:.72rem; color:var(--muted); letter-spacing:.08em; display:block; margin-bottom:6px;}
  .sheet input[type=text]{width:100%;}
  .swatches{display:grid; grid-template-columns:repeat(8,1fr); gap:8px;}
  .swatch{width:100%; aspect-ratio:1; border-radius:50%; border:2px solid rgba(127,127,127,.4); cursor:pointer;}
  .swatch.sel{border-color:var(--text); box-shadow:0 0 0 2px rgba(127,127,127,.5);}
  .sheet .row{display:flex; gap:8px;}
  .sheet .row .btn{flex:1;}

  @media (max-width:620px){
    .barrow{grid-template-columns:64px 1fr 58px;}
    .timer{font-size:1.4rem;}
    td input{width:66px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>歌唱分配計時</h1>
    <button class="btn small" id="themeBtn">外觀</button>
  </div>

  <!-- player -->
  <div class="panel player">
    <video id="media" playsinline></video>
    <div class="row">
      <button class="btn" id="loadBtn">選擇音樂/影片檔</button>
      <button class="btn primary" id="playBtn" disabled>播放</button>
      <div class="timer mono"><span id="cur">00:00.0</span> <small id="dur">/ 00:00</small></div>
    </div>
    <input type="range" class="seek" id="seek" min="0" max="100" step="0.1" value="0" disabled>
    <div class="filehint" id="fileHint">支援 mp3 等音檔及 mp4 等影片。檔案只在本次開啟中使用,不會上傳到任何地方。</div>
  </div>

  <!-- members -->
  <div>
    <div class="members-head">
      <h2>成員(點擊頭像進行設定)</h2>
      <div class="count">
        <button class="btn small" id="memMinus">−</button>
        <span id="memCount" class="mono"></span>
        <button class="btn small" id="memPlus">＋</button>
      </div>
    </div>
    <div class="members" id="members"></div>
  </div>

  <!-- bars -->
  <div>
    <h2>累計演唱時間</h2>
    <div class="bars" id="bars"></div>
  </div>

  <!-- segments -->
  <div class="panel">
    <h2>段落分配</h2>
    <div class="quick">
      <select id="quickMember"></select>
      <button class="btn" id="markBtn" disabled>▶ 由此刻開始標記</button>
      <span class="filehint" id="markState"></span>
    </div>
    <table>
      <thead><tr><th>成員</th><th>開始</th><th>結束</th><th></th><th></th></tr></thead>
      <tbody id="segBody"></tbody>
    </table>
    <div class="hint">
      標記方式一:播放時聽到某人開口,按「由此刻開始標記」,唱完再按一次結束。<br>
      標記方式二:表格直接輸入時間(格式 分:秒.一位小數,如 1:23.5),或按「取now」抓當前播放位置。
    </div>
  </div>
</div>

<!-- member modal -->
<div class="overlay" id="memOverlay"><div class="sheet" id="memSheet"></div></div>

<!-- theme modal -->
<div class="overlay" id="themeOverlay">
  <div class="sheet">
    <h3>介面外觀</h3>
    <div>
      <label>背景顏色(16色)</label>
      <div class="swatches" id="themeSwatches"></div>
    </div>
    <div>
      <label>背景圖片</label>
      <div class="row">
        <button class="btn" id="bgImgBtn">上載背景圖</button>
        <button class="btn" id="bgImgRm">移除背景圖</button>
      </div>
    </div>
    <button class="btn" id="themeClose">完成</button>
  </div>
</div>

<script>
/* ================= palette: 彩虹7 + 淺7 + 黑 + 白 = 16 ================= */
const PALETTE = [
  '#e53935','#fb8c00','#fdd835','#43a047','#1e88e5','#3949ab','#8e24aa',
  '#ef9a9a','#ffcc80','#fff59d','#a5d6a7','#90caf9','#9fa8da','#ce93d8',
  '#111111','#ffffff'
];
const MIN_N=2, MAX_N=9;
function lum(hex){
  const n=parseInt(hex.slice(1),16);
  return (0.299*((n>>16)&255)+0.587*((n>>8)&255)+0.114*(n&255))/255;
}

/* ================= storage ================= */
const store = {
  ok: (()=>{ try{ localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return true; }catch(e){ return false; } })(),
  load(){ if(!this.ok) return null; try{ return JSON.parse(localStorage.getItem('lineDist2')); }catch(e){ return null; } },
  save(d){ if(!this.ok) return; try{ localStorage.setItem('lineDist2', JSON.stringify(d)); }catch(e){ alert('儲存空間不足,部分圖片可能未能保存。'); } }
};
let data = store.load();
if(!data){
  /* 兼容第一版的資料 */
  let old=null; try{ old=JSON.parse(localStorage.getItem('lineDist1')); }catch(e){}
  data = {
    members: (old?.members || Array.from({length:7},(_,i)=>({name:`成員 ${i+1}`,img:null})))
      .map((m,i)=>({ name:m.name, img:m.img||null, color:PALETTE[i%14] })),
    segments: old?.segments || [],
    theme: { bg:'#1b1d22', img:null }
  };
}
data.theme = data.theme || { bg:'#1b1d22', img:null };
function persist(){ store.save(data); }
const N = ()=> data.members.length;

/* ================= theme ================= */
function applyTheme(){
  const t = data.theme, root = document.documentElement.style;
  if(t.img){
    document.body.style.backgroundImage = `url('${t.img}')`;
    document.body.style.backgroundColor = '#1b1d22';
    document.body.classList.add('has-bgimg');
    root.setProperty('--text','#e8e6e1'); root.setProperty('--muted','#a9acb4');
    root.setProperty('--panel','rgba(24,25,30,.78)'); root.setProperty('--line','rgba(255,255,255,.18)');
    root.setProperty('--bg','#1b1d22');
  } else {
    document.body.style.backgroundImage = 'none';
    document.body.classList.remove('has-bgimg');
    const c = t.bg || '#1b1d22';
    document.body.style.backgroundColor = c;
    root.setProperty('--bg', c);
    if(lum(c) > 0.55){  /* 淺色底 → 深色文字 */
      root.setProperty('--text','#1c1d21'); root.setProperty('--muted','#585b63');
      root.setProperty('--panel','rgba(255,255,255,.55)'); root.setProperty('--line','rgba(0,0,0,.22)');
    } else {
      root.setProperty('--text','#e8e6e1'); root.setProperty('--muted','#8b8e97');
      root.setProperty('--panel','rgba(255,255,255,.06)'); root.setProperty('--line','rgba(255,255,255,.16)');
    }
  }
}

/* ================= helpers ================= */
const p = n => String(n).padStart(2,'0');
const fmtT = s => `${p(Math.floor(s/60))}:${p(Math.floor(s%60))}.${Math.floor(s*10%10)}`;
const fmtD = s => `${p(Math.floor(s/60))}:${p(Math.floor(s%60))}`;
const esc = s => s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function parseT(str){
  const m = String(str).trim().match(/^(?:(\d+):)?(\d+(?:\.\d+)?)$/);
  if(!m) return null;
  return (+(m[1]||0))*60 + (+m[2]);
}
function sungUpTo(mi,t){
  let sum=0;
  for(const g of data.segments){ if(g.m===mi) sum += Math.max(0, Math.min(g.e,t)-g.s); }
  return sum;
}
const totalOf = mi => sungUpTo(mi, Infinity);
const isActive = (mi,t) => data.segments.some(g=>g.m===mi && t>=g.s && t<g.e);

/* ================= file inputs (固定,免iOS回收) ================= */
function makeInput(accept, onFile){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept=accept; inp.style.display='none';
  document.body.appendChild(inp);
  inp.addEventListener('change', ()=>{ if(inp.files[0]) onFile(inp.files[0]); });
  return inp;
}

/* ================= media (audio + video 共用) ================= */
const media = document.getElementById('media');
const playBtn = document.getElementById('playBtn');
const seek = document.getElementById('seek');
let mediaReady=false, mediaUrl=null;

const mediaInput = makeInput('audio/*,video/*', f=>{
  if(mediaUrl) URL.revokeObjectURL(mediaUrl);
  mediaUrl = URL.createObjectURL(f);
  media.src = mediaUrl;
  media.classList.toggle('show', f.type.startsWith('video'));
  document.getElementById('fileHint').textContent = `已載入:${f.name}`;
});
document.getElementById('loadBtn').onclick = ()=>{ mediaInput.value=''; mediaInput.click(); };

media.addEventListener('loadedmetadata', ()=>{
  mediaReady=true;
  playBtn.disabled=false; seek.disabled=false;
  document.getElementById('markBtn').disabled=false;
  seek.max=media.duration;
  document.getElementById('dur').textContent='/ '+fmtD(media.duration);
});
playBtn.onclick = ()=>{
  if(media.paused){ media.play(); playBtn.textContent='暫停'; }
  else { media.pause(); playBtn.textContent='播放'; }
};
media.addEventListener('ended', ()=>{ playBtn.textContent='播放'; });
seek.addEventListener('input', ()=>{ media.currentTime=+seek.value; });

/* ================= members ================= */
const membersEl = document.getElementById('members');
function renderMembers(){
  membersEl.style.gridTemplateColumns = `repeat(${N()},1fr)`;
  membersEl.innerHTML='';
  data.members.forEach((m,i)=>{
    const d=document.createElement('div');
    d.className='member'; d.dataset.i=i;
    d.style.setProperty('--c', m.color);
    d.innerHTML=`
      <div class="avatar">${m.img?`<img src="${m.img}" alt="">`:'♪'}</div>
      <div class="mname">${esc(m.name)}</div>`;
    d.onclick = ()=> openMember(i);
    membersEl.appendChild(d);
  });
  document.getElementById('memCount').textContent = N();
}
document.getElementById('memPlus').onclick = ()=>{
  if(N()>=MAX_N) return;
  data.members.push({ name:`成員 ${N()+1}`, img:null, color:PALETTE[N()%14] });
  persist(); renderAll();
};
document.getElementById('memMinus').onclick = ()=>{
  if(N()<=MIN_N) return;
  const gone = N()-1;
  if(data.segments.some(g=>g.m===gone) &&
     !confirm(`「${data.members[gone].name}」已有標記段落,一併刪除?`)) return;
  data.members.pop();
  data.segments = data.segments.filter(g=>g.m<N());
  persist(); renderAll();
};

/* 照片:置中裁成 3:4 直向 */
let photoTarget=null;
const photoInput = makeInput('image/*', f=>{
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{
    const W=240,H=320, R=3/4;
    let sw,sh;
    if(img.width/img.height > R){ sh=img.height; sw=sh*R; } else { sw=img.width; sh=sw/R; }
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    cv.getContext('2d').drawImage(img,(img.width-sw)/2,(img.height-sh)/2,sw,sh,0,0,W,H);
    data.members[photoTarget].img = cv.toDataURL('image/jpeg',.8);
    URL.revokeObjectURL(url);
    persist(); renderAll();
    if(photoTarget!=null) openMember(photoTarget);
  };
  img.src=url;
});

/* member modal */
const memOverlay=document.getElementById('memOverlay');
const memSheet=document.getElementById('memSheet');
function openMember(i){
  const m=data.members[i];
  memSheet.innerHTML=`
    <h3>成員設定</h3>
    <div><label>名稱</label><input type="text" id="mName" value="${esc(m.name)}" maxlength="20"></div>
    <div><label>Bar 顏色(16色)</label>
      <div class="swatches">${PALETTE.map(c=>
        `<button class="swatch ${c===m.color?'sel':''}" style="background:${c}" data-c="${c}"></button>`).join('')}</div>
    </div>
    <div><label>照片(3:4 直向)</label>
      <div class="row">
        <button class="btn" id="mPhoto">上載照片</button>
        ${m.img?'<button class="btn" id="mPhotoRm">移除照片</button>':''}
      </div>
    </div>
    <button class="btn" id="mClose">完成</button>`;
  memOverlay.classList.add('open');
  memSheet.querySelector('#mName').onchange = e=>{
    m.name=e.target.value.trim()||m.name; persist(); renderAll();
  };
  memSheet.querySelectorAll('.swatch').forEach(s=> s.onclick=()=>{
    m.color=s.dataset.c; persist(); renderAll(); openMember(i);
  });
  memSheet.querySelector('#mPhoto').onclick = ()=>{
    photoTarget=i; photoInput.value=''; photoInput.click();
  };
  const rm=memSheet.querySelector('#mPhotoRm');
  if(rm) rm.onclick=()=>{ m.img=null; persist(); renderAll(); openMember(i); };
  memSheet.querySelector('#mClose').onclick=()=> memOverlay.classList.remove('open');
}
memOverlay.addEventListener('click',e=>{ if(e.target===memOverlay) memOverlay.classList.remove('open'); });

/* ================= bars ================= */
const barsEl=document.getElementById('bars');
function renderBars(){
  barsEl.innerHTML='';
  data.members.forEach((m,i)=>{
    const r=document.createElement('div');
    r.className='barrow'; r.dataset.i=i;
    r.style.setProperty('--c', m.color);
    r.innerHTML=`
      <div class="bname">${esc(m.name)}</div>
      <div class="track"><div class="fill"></div></div>
      <div class="bval mono">0.0s</div>`;
    barsEl.appendChild(r);
  });
}

/* ================= live update ================= */
function frame(){
  const t = media.currentTime||0;
  document.getElementById('cur').textContent = fmtT(t);
  if(mediaReady && !seek.matches(':active')) seek.value=t;
  const maxTotal = Math.max(1, ...data.members.map((_,i)=>totalOf(i)));
  document.querySelectorAll('.barrow').forEach(r=>{
    const i=+r.dataset.i, v=sungUpTo(i,t);
    r.querySelector('.fill').style.width=(v/maxTotal*100)+'%';
    r.querySelector('.bval').textContent=v.toFixed(1)+'s';
    r.classList.toggle('active', isActive(i,t));
  });
  document.querySelectorAll('.member').forEach(d=>
    d.classList.toggle('active', isActive(+d.dataset.i,t)));
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ================= segments ================= */
const segBody=document.getElementById('segBody');
const quickMember=document.getElementById('quickMember');
const markBtn=document.getElementById('markBtn');
const markState=document.getElementById('markState');
let marking=null;

function renderQuickSelect(){
  quickMember.innerHTML = data.members.map((m,i)=>
    `<option value="${i}">${esc(m.name)}</option>`).join('');
}
markBtn.onclick=()=>{
  const t=media.currentTime;
  if(!marking){
    marking={m:+quickMember.value, s:t};
    markBtn.textContent='■ 結束標記';
    markState.textContent=`${data.members[marking.m].name} 由 ${fmtT(t)} 開始…`;
  } else {
    if(t>marking.s+0.2){
      data.segments.push({m:marking.m, s:+marking.s.toFixed(1), e:+t.toFixed(1)});
      data.segments.sort((a,b)=>a.s-b.s);
      persist(); renderSegs();
    }
    marking=null;
    markBtn.textContent='▶ 由此刻開始標記';
    markState.textContent='';
  }
};
function renderSegs(){
  segBody.innerHTML='';
  data.segments.forEach((g,gi)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="dot" style="background:${data.members[g.m].color}"></span>
        <select data-f="m">${data.members.map((m,i)=>
          `<option value="${i}" ${i===g.m?'selected':''}>${esc(m.name)}</option>`).join('')}</select></td>
      <td><input type="text" class="mono" value="${fmtT(g.s)}" data-f="s">
          <button class="tbtn" data-f="nows">取now</button></td>
      <td><input type="text" class="mono" value="${fmtT(g.e)}" data-f="e">
          <button class="tbtn" data-f="nowe">取now</button></td>
      <td class="mono" style="color:var(--muted)">${(g.e-g.s).toFixed(1)}s</td>
      <td><button class="tbtn" data-f="del">刪除</button></td>`;
    tr.querySelector('[data-f=m]').onchange=e=>{ g.m=+e.target.value; persist(); renderSegs(); };
    tr.querySelector('[data-f=s]').onchange=e=>{
      const v=parseT(e.target.value); if(v!=null&&v<g.e){ g.s=v; persist(); } renderSegs(); };
    tr.querySelector('[data-f=e]').onchange=e=>{
      const v=parseT(e.target.value); if(v!=null&&v>g.s){ g.e=v; persist(); } renderSegs(); };
    tr.querySelector('[data-f=nows]').onclick=()=>{
      const t=+media.currentTime.toFixed(1); if(t<g.e){ g.s=t; persist(); renderSegs(); } };
    tr.querySelector('[data-f=nowe]').onclick=()=>{
      const t=+media.currentTime.toFixed(1); if(t>g.s){ g.e=t; persist(); renderSegs(); } };
    tr.querySelector('[data-f=del]').onclick=()=>{
      data.segments.splice(gi,1); persist(); renderSegs(); };
    segBody.appendChild(tr);
  });
  const tr=document.createElement('tr');
  tr.innerHTML=`<td colspan="5"><button class="tbtn" id="addSeg">＋ 手動新增段落</button></td>`;
  tr.querySelector('#addSeg').onclick=()=>{
    const t=+(media.currentTime||0).toFixed(1);
    data.segments.push({m:+quickMember.value, s:t, e:t+5});
    persist(); renderSegs();
  };
  segBody.appendChild(tr);
}

/* ================= theme UI ================= */
const themeOverlay=document.getElementById('themeOverlay');
document.getElementById('themeBtn').onclick=()=>{
  const box=document.getElementById('themeSwatches');
  box.innerHTML = PALETTE.map(c=>
    `<button class="swatch ${(!data.theme.img && c===data.theme.bg)?'sel':''}" style="background:${c}" data-c="${c}"></button>`).join('');
  box.querySelectorAll('.swatch').forEach(s=> s.onclick=()=>{
    data.theme.bg=s.dataset.c; data.theme.img=null;
    persist(); applyTheme();
    document.getElementById('themeBtn').click(); themeOverlay.classList.add('open');
  });
  themeOverlay.classList.add('open');
};
const bgInput = makeInput('image/*', f=>{
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{
    const max=1600, sc=Math.min(1, max/Math.max(img.width,img.height));
    const cv=document.createElement('canvas');
    cv.width=img.width*sc; cv.height=img.height*sc;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    data.theme.img = cv.toDataURL('image/jpeg',.72);
    URL.revokeObjectURL(url);
    persist(); applyTheme();
  };
  img.src=url;
});
document.getElementById('bgImgBtn').onclick=()=>{ bgInput.value=''; bgInput.click(); };
document.getElementById('bgImgRm').onclick=()=>{ data.theme.img=null; persist(); applyTheme(); };
document.getElementById('themeClose').onclick=()=> themeOverlay.classList.remove('open');
themeOverlay.addEventListener('click',e=>{ if(e.target===themeOverlay) themeOverlay.classList.remove('open'); });

/* ================= init ================= */
function renderAll(){ renderMembers(); renderBars(); renderQuickSelect(); renderSegs(); }
applyTheme(); renderAll();
</script>
</body>
</html>
